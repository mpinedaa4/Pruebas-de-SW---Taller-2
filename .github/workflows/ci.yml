name: CI-Pipeline

# Permisos para que github-actions[bot] pueda hacer push a gh-pages
permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Install deps
        run: pip install pytest

      # 4. Pruebas unitarias
      - name: Run tests
        run: pytest test_integration_with_fake.py -v